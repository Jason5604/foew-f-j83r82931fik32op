<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 完美适配手机端视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 屏蔽图片防盗链 -->
    <meta name="referrer" content="no-referrer">
    <title>试卷解析导出工具</title>
    <style>
        /* ================= 屏幕显示的 Apple 简约 UI ================= */
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --card-bg: #ffffff;
            --border-color: #d2d2d7;
            --radius-large: 24px;
            --radius-medium: 12px;
            --radius-pill: 980px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .no-print {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .control-panel {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 32px 24px;
            border-radius: var(--radius-large);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-medium);
            resize: none;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 13px;
            background-color: #fafafa;
            color: var(--text-main);
            transition: all 0.3s ease;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:active {
            transform: scale(0.98);
        }

        button.success-btn {
            background-color: #34c759;
            display: none;
        }

        button:disabled {
            background-color: #e5e5ea;
            color: #86868b;
            cursor: not-allowed;
        }

        #status-text {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            color: var(--accent-color);
            min-height: 20px;
        }

        .preview-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        .img-wrapper-screen {
            background: var(--card-bg);
            padding: 12px;
            border-radius: var(--radius-large);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            text-align: center;
        }

        .img-wrapper-screen img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-medium);
            display: inline-block;
        }

        /* ================= 专门针对 iOS Safari 优化的物理级打印引擎 ================= */
        @media print {
            /* 1. 彻底清零边距，抹杀 iOS 时间和域名水印 */
            @page {
                size: A4 portrait !important;
                margin: 0 !important;
            }

            /* 2. 锁死 A4 物理宽度，解决“太宽”的问题 */
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background-color: #ffffff !important;
                width: 210mm !important; 
            }

            /* 隐藏屏幕控制区 */
            .no-print {
                display: none !important;
            }

            .preview-container {
                display: block !important;
                width: 210mm !important;
                padding: 0 !important;
                margin: 0 auto !important;
                background-color: transparent !important;
            }

            /* 3. 苹果排版引擎防坑：改用 block 布局，锁定每页物理高宽 */
            .img-wrapper-screen {
                display: block !important;
                width: 210mm !important;
                height: 296mm !important; /* 留出1mm的安全区，防止多出一张空白页 */
                page-break-after: always !important;
                break-after: page !important;
                margin: 0 !important;
                padding: 0 !important;
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                overflow: hidden !important; 
            }

            /* 最后一页不换页 */
            .img-wrapper-screen:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            /* 4. 图片等比例适应 A4 纸内，绝对不溢出拉宽 */
            .img-wrapper-screen img {
                display: block !important;
                width: 100% !important;
                height: 100% !important;
                max-width: 210mm !important;
                max-height: 296mm !important;
                object-fit: contain !important; /* 等比缩放，不会裁切 */
                object-position: center center !important; /* 画面居中 */
                margin: 0 auto !important;
                padding: 0 !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="control-panel">
            <div class="header">
                <h1>导出试卷 PDF</h1>
                <p>纯内存排版，0网络损耗</p>
            </div>
            
            <textarea id="json-input" placeholder='请在此粘贴包含 images 的 JSON 数组数据...'></textarea>
            
            <div class="btn-group">
                <button id="parse-btn" onclick="parseAndPreview()">1. 解析 JSON 并渲染</button>
                <button id="export-btn" class="success-btn" onclick="triggerPrint()">2. 存为本地 PDF</button>
            </div>

            <div id="status-text"></div>
        </div>
    </div>

    <!-- 图片预览与 PDF 渲染容器 -->
    <div class="preview-container" id="image-container"></div>

    <script>
        function parseAndPreview() {
            const inputData = document.getElementById('json-input').value.trim();
            const container = document.getElementById('image-container');
            const status = document.getElementById('status-text');
            const parseBtn = document.getElementById('parse-btn');
            const exportBtn = document.getElementById('export-btn');
            
            if (!inputData) {
                status.innerText = "⚠️ 请先粘贴 JSON 数据";
                status.style.color = "#ff3b30";
                return;
            }

            let data;
            try {
                data = JSON.parse(inputData);
            } catch (e) {
                status.innerText = "⚠️ JSON 解析失败，请检查格式";
                status.style.color = "#ff3b30";
                return;
            }

            // 修改网页 Title（iOS Safari 会自动把 Title 作为 PDF 的默认保存名）
            let fileName = "合并试卷";
            if (data.length > 0 && data[0].fileName) {
                fileName = data[0].fileName.replace(/\(原卷版\).*|\(解析版\).*/g, '').trim();
            }
            document.title = fileName; 

            let images = [];
            data.forEach(item => {
                if (item.images && Array.isArray(item.images)) {
                    images = images.concat(item.images);
                }
            });

            if (images.length === 0) {
                status.innerText = "⚠️ 未在 JSON 中发现有效图片";
                status.style.color = "#ff3b30";
                return;
            }

            container.innerHTML = '';
            parseBtn.disabled = true;
            exportBtn.style.display = 'none';
            status.innerText = `正在处理 ${images.length} 张试卷...`;
            status.style.color = "var(--accent-color)";

            let loadedCount = 0;

            images.forEach((url, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper-screen';

                const img = document.createElement('img');
                
                img.onload = img.onerror = () => {
                    loadedCount++;
                    status.innerText = `加载至内存: ${loadedCount} / ${images.length}`;
                    
                    if (loadedCount === images.length) {
                        status.innerText = `✅ 内存渲染完毕，可以导出`;
                        status.style.color = "#34c759";
                        parseBtn.innerText = "重新解析数据";
                        parseBtn.disabled = false;
                        exportBtn.style.display = 'block';
                    }
                };

                img.src = url;
                wrapper.appendChild(img);
                container.appendChild(wrapper);
            });
        }

        function triggerPrint() {
            // 给系统一丁点缓冲时间应用打印样式
            setTimeout(() => {
                window.print();
            }, 100);
        }
    </script>
</body>
</html>
