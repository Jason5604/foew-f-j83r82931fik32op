<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 完美适配手机端的视口设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 屏蔽基本的防盗链 -->
    <meta name="referrer" content="no-referrer">
    <title>试卷一键导出 PDF</title>
    <!-- 引入 jsPDF：用于在设备本地纯离线生成 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Apple 风格高级简约 CSS */
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --card-bg: #ffffff;
            --border-color: #d2d2d7;
            --radius-large: 24px;
            --radius-medium: 12px;
            --radius-pill: 980px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-large);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            margin: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0 0 8px 0;
        }

        .header p {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-medium);
            resize: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            background-color: #fafafa;
            color: var(--text-main);
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        textarea::placeholder {
            color: #a1a1a6;
        }

        button {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 8px;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #e5e5ea;
            color: #86868b;
            cursor: not-allowed;
            transform: none;
        }

        .status-box {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            color: var(--accent-color);
            transition: all 0.3s ease;
        }

        /* 手机端专门适配 */
        @media (max-width: 600px) {
            .container {
                padding: 24px 20px;
                border-radius: 20px;
                margin: 16px;
            }
            .header h1 {
                font-size: 24px;
            }
            textarea {
                height: 140px;
            }
            button {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>转换为 PDF</h1>
            <p>粘贴包含图片链接的 JSON 数据<br>全程在您的设备内存中生成，安全无痕</p>
        </div>

        <div class="input-area">
            <textarea id="json-input" placeholder='请在此处粘贴包含 images 的 JSON 数组数据...'></textarea>
            <button id="generate-btn" onclick="processAndGeneratePDF()">解析并导出 PDF</button>
        </div>

        <div class="status-box" id="status-box"></div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        async function processAndGeneratePDF() {
            const inputData = document.getElementById('json-input').value.trim();
            const statusBox = document.getElementById('status-box');
            const btn = document.getElementById('generate-btn');
            
            if (!inputData) {
                showStatus("⚠️ 请先输入 JSON 数据", "#ff3b30");
                return;
            }

            let data;
            try {
                data = JSON.parse(inputData);
            } catch(e) {
                showStatus("⚠️ JSON 解析失败，请检查格式", "#ff3b30");
                return;
            }

            // 智能提取干净的文件名
            let fileName = "合并试卷";
            if (data.length > 0 && data[0].fileName) {
                fileName = data[0].fileName.replace(/\(原卷版\).*|\(解析版\).*/g, '').trim();
            }

            // 提取所有图片
            let images = [];
            data.forEach(item => {
                if (item.images && Array.isArray(item.images)) {
                    images = images.concat(item.images);
                }
            });

            if (images.length === 0) {
                showStatus("⚠️ 未发现有效的图片数据", "#ff3b30");
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在处理中...";

            try {
                // 初始化 PDF (A4 竖排)
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();

                for (let i = 0; i < images.length; i++) {
                    showStatus(`正在拉取并渲染第 ${i + 1} / ${images.length} 页...`, "var(--accent-color)");
                    
                    // 获取图片 Base64 数据 (自带防跨域处理)
                    const { base64, width, height, format } = await fetchImageBase64(images[i]);
                    
                    // 智能 A4 居中排版算法
                    const ratio = width / height;
                    let finalWidth = pdfWidth;
                    let finalHeight = finalWidth / ratio;

                    if (finalHeight > pdfHeight) {
                        finalHeight = pdfHeight;
                        finalWidth = finalHeight * ratio;
                    }

                    const x = (pdfWidth - finalWidth) / 2;
                    const y = (pdfHeight - finalHeight) / 2;

                    if (i > 0) pdf.addPage();
                    pdf.addImage(base64, format, x, y, finalWidth, finalHeight);
                }

                showStatus(`✨ 处理完成！正在触发下载...`, "#34c759");
                
                // 触发纯本地下载
                pdf.save(fileName + ".pdf");
                
                setTimeout(() => {
                    showStatus("✅ 已成功保存到您的设备", "#34c759");
                    btn.disabled = false;
                    btn.innerText = "再次解析并导出";
                }, 1000);

            } catch (err) {
                console.error(err);
                showStatus("❌ 处理中断：图片防盗链拦截或网络异常", "#ff3b30");
                btn.disabled = false;
                btn.innerText = "解析并导出 PDF";
            }
        }

        function showStatus(text, color) {
            const statusBox = document.getElementById('status-box');
            statusBox.innerText = text;
            statusBox.style.color = color;
        }

        // 核心突破防盗链的方法
        async function fetchImageBase64(url) {
            let blob;
            try {
                // 第一步尝试：直接请求，并隐藏 Referer (解决 80% 防盗链)
                const res = await fetch(url, { referrerPolicy: 'no-referrer' });
                if (!res.ok) throw new Error('CORS block');
                blob = await res.blob();
            } catch (e) {
                // 第二步尝试：利用开源代理强行绕过 CORS (解决剩下的严格防爬虫)
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                const res = await fetch(proxyUrl);
                if (!res.ok) throw new Error('Fetch failed');
                blob = await res.blob();
            }

            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64data = reader.result;
                    let format = 'JPEG';
                    if(base64data.indexOf('data:image/png') === 0) format = 'PNG';

                    const img = new Image();
                    img.onload = () => resolve({ base64: base64data, width: img.width, height: img.height, format: format });
                    img.onerror = () => reject(new Error('Image decode error'));
                    img.src = base64data;
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
    </script>
</body>
</html>
