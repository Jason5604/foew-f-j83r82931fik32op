<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 核心：绕过图片防盗链，允许图片在页面正常显示 -->
    <meta name="referrer" content="no-referrer">
    <title>试卷解析工具</title>
    <style>
        /* ================= Apple 风格屏幕 UI ================= */
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --accent-hover: #0077ed;
            --card-bg: #ffffff;
            --border-color: #d2d2d7;
            --radius-large: 24px;
            --radius-medium: 12px;
            --radius-pill: 980px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 打印时隐藏控制区 */
        .no-print {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .control-panel {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius-large);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .header p {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-medium);
            resize: none;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 13px;
            background-color: #fafafa;
            color: var(--text-main);
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: scale(0.98);
        }

        button.success-btn {
            background-color: #34c759;
            display: none; /* 初始隐藏 */
        }

        button.success-btn:hover {
            background-color: #30b753;
        }

        button:disabled {
            background-color: #e5e5ea;
            color: #86868b;
            cursor: not-allowed;
            transform: none;
        }

        #status-text {
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            color: var(--accent-color);
            min-height: 20px;
        }

        /* 预览区样式 */
        .preview-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        .img-wrapper {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--radius-large);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
        }

        .img-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-medium);
            display: block;
        }

        /* ================= 纯净 0 网络合并 PDF 引擎 (利用打印机制) ================= */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* 无边距 */
            }
            body, html {
                margin: 0;
                padding: 0;
                background-color: #ffffff;
            }
            /* 打印时彻底隐藏所有 UI */
            .no-print {
                display: none !important;
            }
            .preview-container {
                display: block;
                padding: 0;
                margin: 0;
                max-width: none;
            }
            /* 每一张图片强制占满一整页 A4 */
            .img-wrapper {
                page-break-after: always;
                break-after: page;
                width: 100vw;
                height: 100vh;
                margin: 0 !important;
                padding: 0 !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                background: transparent !important;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .img-wrapper img {
                max-width: 100%;
                max-height: 100%;
                width: 100%;
                height: 100%;
                object-fit: contain; /* 等比例缩放居中，绝不裁剪 */
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="control-panel">
            <div class="header">
                <h1>试卷解析与导出</h1>
                <p>底层内存渲染，纯粹 0 网络断点合并</p>
            </div>
            
            <textarea id="json-input" placeholder='请在此粘贴包含 images 的完整 JSON 数据...'></textarea>
            
            <div class="btn-group">
                <button id="parse-btn" onclick="parseAndPreview()">1. 解析 JSON 并预览</button>
                <button id="export-btn" class="success-btn" onclick="window.print()">2. 合并并导出 PDF</button>
            </div>

            <div id="status-text"></div>
        </div>
    </div>

    <!-- 图片预览与 PDF 渲染容器 -->
    <div class="preview-container" id="image-container"></div>

    <script>
        function parseAndPreview() {
            const inputData = document.getElementById('json-input').value.trim();
            const container = document.getElementById('image-container');
            const status = document.getElementById('status-text');
            const parseBtn = document.getElementById('parse-btn');
            const exportBtn = document.getElementById('export-btn');
            
            if (!inputData) {
                status.innerText = "⚠️ 请先粘贴 JSON 数据";
                status.style.color = "#ff3b30";
                return;
            }

            let data;
            try {
                data = JSON.parse(inputData);
            } catch (e) {
                status.innerText = "⚠️ JSON 解析失败，请检查格式";
                status.style.color = "#ff3b30";
                return;
            }

            // 【黑科技】提取干净文件名并修改网页 Title
            // 当调用 window.print() 导出 PDF 时，浏览器会自动使用 Title 作为 PDF 的文件名
            let fileName = "合并试卷";
            if (data.length > 0 && data[0].fileName) {
                fileName = data[0].fileName.replace(/\(原卷版\).*|\(解析版\).*/g, '').trim();
            }
            document.title = fileName; 

            let images = [];
            data.forEach(item => {
                if (item.images && Array.isArray(item.images)) {
                    images = images.concat(item.images);
                }
            });

            if (images.length === 0) {
                status.innerText = "⚠️ 未在 JSON 中发现有效图片";
                status.style.color = "#ff3b30";
                return;
            }

            // 初始化 UI
            container.innerHTML = '';
            parseBtn.disabled = true;
            exportBtn.style.display = 'none';
            status.innerText = `发现 ${images.length} 张试卷，正在本地内存渲染中...`;
            status.style.color = "var(--accent-color)";

            let loadedCount = 0;

            // 渲染图片
            images.forEach((url, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';

                const img = document.createElement('img');
                
                // 监听加载完成，全部加载完才允许导出，确保 PDF 不缺页
                img.onload = img.onerror = () => {
                    loadedCount++;
                    status.innerText = `正在加载: ${loadedCount} / ${images.length}`;
                    
                    if (loadedCount === images.length) {
                        status.innerText = `✅ 全部渲染完成！请点击下方绿色按钮导出`;
                        status.style.color = "#34c759";
                        parseBtn.innerText = "重新解析";
                        parseBtn.disabled = false;
                        exportBtn.style.display = 'block';
                    }
                };

                img.src = url;
                wrapper.appendChild(img);
                container.appendChild(wrapper);
            });
        }
    </script>
</body>
</html>
